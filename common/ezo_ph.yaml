---
substitutions:
  # pH circuit, who's address is 99
  addPH: "99"
  update_ph: "60s"

  sorting_group_ph: '30'

web_server:
  sorting_groups:
    - id: sorting_group_ph
      name: "pH - EZO"
      sorting_weight: ${sorting_group_ph}

globals:
  - id: ph_cal_mid_done
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: ph_cal_low_done
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: ph_cal_high_done
    type: bool
    restore_value: true
    initial_value: 'false'

api:
  actions:
    - action: ph_change_address
      variables:
        address: int
      then:
        - lambda: |-
            id(ph_ezo).send_custom("I2C,{{address}}");
    - action: ph_read_continuous
      then:
        - repeat:
            count: 60
            then:
              - button.press: read_ph
              - delay: 1s
    - action: ph_calibrate_mid_7
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_mid(7.00);
            id(ph_cal_mid_done) = true;
            id(ph_cal_low_done) = false;
            id(ph_cal_high_done) = false;
    - action: ph_calibrate_low_4
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_low(4.00);
            id(ph_cal_low_done) = true;
    - action: ph_calibrate_high_10
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_high(10.00);
            id(ph_cal_high_done) = true;
    - action: ph_calibrate_high_1001
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_high(10.01);
    - action: ph_calibrate_mid
      variables:
        value: float
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_mid(value);
    - action: ph_calibrate_low
      variables:
        value: float
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_low(value);
    - action: ph_calibrate_high
      variables:
        value: float
      then:
        - lambda: |-
            id(ph_ezo).set_calibration_point_high(value);
    - action: ph_custom_command
      variables:
        command: string
      then:
        - lambda: |-
            id(ph_ezo).send_custom(command.c_str());

esphome:
  on_boot:
    - priority: 800
      then:
        - button.press: send_selected_ph
    - priority: 200
      then:
        - lambda: |-
            if (!id(ph_cal_mid_done)) {
              ESP_LOGW("ezo_ph", "pH sensor may not have its required MID calibration yet. Run calibration via 'pH - Command Select'.");
            }

sensor:
  # EZO Circuits (SCL/RX, SDA/TX)
  # EZO Circuit - pH
  - platform: ezo
    icon: mdi:ph
    name: "pH"
    id: ph_ezo
    address: ${addPH}
    unit_of_measurement: ""
    accuracy_decimals: 2
    update_interval: "${update_ph}"
    state_class: "measurement"
    device_class: PH
    on_custom:
      then:
        - lambda:
            id(result_ph).publish_state(x);
    on_calibration:
      then:
        - lambda:
            id(result_ph).publish_state(x);
    on_device_information:
      then:
        - lambda:
            id(result_ph).publish_state(x);
    on_slope:
      then:
        - lambda:
            id(result_ph).publish_state(x);
    on_t:
      then:
        - lambda:
            id(result_ph).publish_state(x);
    web_server:
      sorting_group_id: sorting_group_ph
      sorting_weight: 10

text_sensor:
  # Selected Command Result - pH
  - platform: template
    name: pH - Command Result
    icon: mdi:data-matrix
    id: result_ph
    # disabled_by_default: true
    web_server:
      sorting_group_id: sorting_group_ph

binary_sensor:
  - platform: template
    name: "pH - Calibrated (MID)"
    id: ph_cal_mid_sensor
    icon: mdi:check-circle
    entity_category: "diagnostic"
    lambda: |-
      return id(ph_cal_mid_done);
    web_server:
      sorting_group_id: sorting_group_ph

  - platform: template
    name: "pH - Calibrated (LOW)"
    id: ph_cal_low_sensor
    icon: mdi:check-circle
    entity_category: "diagnostic"
    lambda: |-
      return id(ph_cal_low_done);
    web_server:
      sorting_group_id: sorting_group_ph

  - platform: template
    name: "pH - Calibrated (HIGH)"
    id: ph_cal_high_sensor
    icon: mdi:check-circle
    entity_category: "diagnostic"
    lambda: |-
      return id(ph_cal_high_done);
    web_server:
      sorting_group_id: sorting_group_ph

button:
  # Read pH Probe
  - platform: template
    name: pH - Read
    id: read_ph
    icon: mdi:read
    entity_category: "Config"
    # disabled_by_default: true
    on_press:
      then:
        - lambda: |-
            esphome::i2c::ErrorCode err = id(bus_a)->write(${addPH}, nullptr, 0);
            if (err == esphome::i2c::ERROR_OK) {
              id(ph_ezo).send_custom("R");
            }
            else {
              ESP_LOGW("custom_ph_read", "No pH sensor detected at address: ${addPH}!!");
            }
    web_server:
      sorting_group_id: sorting_group_ph

  # Send Selected EZO Command - pH
  - platform: template
    name: pH - Command Send Selected
    id: send_selected_ph
    entity_category: "Config"
    icon: mdi:apple-keyboard-command
    # disabled_by_default: true
    on_press:
      then:
        - lambda: |-
            if (id(select_command_ph).current_option() == "Read") {
              id(ph_ezo).send_custom("R");
              ESP_LOGD("ezo_ph", "pH read command sent. Check 'pH - Command Result' for response.");
            }
            // Get Device Firmware Version
            else if (id(select_command_ph).current_option() == "Information") {
              id(ph_ezo).get_device_information();
              ESP_LOGD("ezo_ph", "pH information command sent. Check 'pH - Command Result' for response.");
            }
            else if (id(select_command_ph).current_option() == "Status") {
              id(ph_ezo).send_custom("Status");
              ESP_LOGD("ezo_ph", "pH status command sent. Check 'pH - Command Result' for response.");
            }
            else if (id(select_command_ph).current_option() == "Get Slope") {
              id(ph_ezo).get_slope();
              ESP_LOGD("ezo_ph", "pH slope check sent. Check 'pH - Command Result' for response.");
            }
            else if (id(select_command_ph).current_option() == "Check Calibration") {
              id(ph_ezo).get_calibration();
              ESP_LOGD("ezo_ph", "pH calibration check sent. Check 'pH - Command Result' for response.");
            }
            else if (id(select_command_ph).current_option() == "Calibrate @ MID = 7 (WILL RESET CALIBRATION)") {
              id(ph_ezo).set_calibration_point_mid(7.00);
              id(ph_cal_mid_done) = true;
              id(ph_cal_low_done) = false;
              id(ph_cal_high_done) = false;
              ESP_LOGI("ezo_ph", "pH calibration sent: MID = 7.00");
            }
            else if (id(select_command_ph).current_option() == "Calibrate @ LOW = 4 (WILL RESET CALIBRATION)") {
              id(ph_ezo).set_calibration_point_low(4.00);
              id(ph_cal_low_done) = true;
              ESP_LOGI("ezo_ph", "pH calibration sent: LOW = 4.00. Check 'pH - Command Result' for confirmation.");
            }
            else if (id(select_command_ph).current_option() == "Calibrate @ HIGH = 10 (WILL RESET CALIBRATION)") {
              id(ph_ezo).set_calibration_point_high(10.00);
              id(ph_cal_high_done) = true;
              ESP_LOGI("ezo_ph", "pH calibration sent: HIGH = 10.00. Check 'pH - Command Result' for confirmation.");
            }
            else if (id(select_command_ph).current_option() == "Calibrate @ HIGH = 10.01 (WILL RESET CALIBRATION)") {
              id(ph_ezo).set_calibration_point_high(10.01);
              id(ph_cal_high_done) = true;
              ESP_LOGI("ezo_ph", "pH calibration sent: HIGH = 10.01. Check 'pH - Command Result' for confirmation.");
            }
            else if (id(select_command_ph).current_option() == "Calibrate CLEAR (WILL RESET CALIBRATION)") {
              id(ph_ezo).clear_calibration();
              id(ph_cal_mid_done) = false;
              id(ph_cal_low_done) = false;
              id(ph_cal_high_done) = false;
              ESP_LOGI("ezo_ph", "pH calibration CLEARED. All calibration points reset.");
            }
            else if (id(select_command_ph).current_option() == "Factory Reset") {
              id(ph_ezo).send_custom("Factory");
              id(ph_cal_mid_done) = false;
              id(ph_cal_low_done) = false;
              id(ph_cal_high_done) = false;
              ESP_LOGW("ezo_ph", "pH Factory Reset sent! Device has been reset to factory defaults.");
            }
    web_server:
      sorting_group_id: sorting_group_ph

  - platform: template
    name: "pH - Reset Calibration Flags"
    id: ph_cal_reset_flags
    icon: mdi:flag-remove
    entity_category: "Config"
    disabled_by_default: true
    on_press:
      - lambda: |-
          id(ph_cal_mid_done) = false;
          id(ph_cal_low_done) = false;
          id(ph_cal_high_done) = false;
          ESP_LOGI("ezo_ph", "pH calibration flags manually reset.");
    web_server:
      sorting_group_id: sorting_group_ph

select:
  - platform: template
    name: pH - Command Select
    id: select_command_ph
    icon: mdi:apple-keyboard-command
    optimistic: true
    # disabled_by_default: true
    entity_category: "Config"
    options:
      - "Read"
      - "Information"
      - "Status"
      - "Get Slope"
      - "Check Calibration"
      - "Calibrate @ MID = 7 (WILL RESET CALIBRATION)"
      - "Calibrate @ LOW = 4 (WILL RESET CALIBRATION)"
      - "Calibrate @ HIGH = 10 (WILL RESET CALIBRATION)"
      - "Calibrate @ HIGH = 10.01 (WILL RESET CALIBRATION)"
      - "Calibrate CLEAR (WILL RESET CALIBRATION)"
      - "Factory Reset"
    initial_option: "Check Calibration"
    set_action:
      - logger.log:
          format: "Chosen option: %s"
          args: ["x.c_str()"]
    web_server:
      sorting_group_id: sorting_group_ph
