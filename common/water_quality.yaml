binary_sensor:
  # pH Range Check
  - platform: template
    id: ideal_ph
    name: "pH In Range"
    lambda: |-
      if (id(ph_ezo).has_state() && id(ph_ideal_low).has_state() && id(ph_ideal_high).has_state()) {
        return (id(ph_ezo).state >= id(ph_ideal_low).state && id(ph_ezo).state <= id(ph_ideal_high).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality

  # ORP Range Check
  - platform: template
    id: ideal_orp
    name: "ORP In Range"
    lambda: |-
      if (id(orp_ezo).has_state() && id(orp_min_good).has_state()) {
        return (id(orp_ezo).state >= id(orp_min_good).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality

  # DO Range Check
  - platform: template
    id: ideal_do
    name: "DO In Range"
    lambda: |-
      if (id(sensor_do_percent).has_state() && id(do_ideal_low).has_state() && id(do_ideal_high).has_state()) {
        return (id(sensor_do_percent).state >= id(do_ideal_low).state && id(sensor_do_percent).state <= id(do_ideal_high).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality

  - platform: template
    id: ideal_ec
    name: "EC In Range"
    lambda: |-
      if (id(ec_ezo).has_state() && id(ec_ideal_low).has_state() && id(ec_ideal_high).has_state()) {
        return (id(ec_ezo).state >= id(ec_ideal_low).state && id(ec_ezo).state <= id(ec_ideal_high).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality