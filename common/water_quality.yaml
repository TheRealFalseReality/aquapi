substitutions:
  sorting_group_water_quality: '20'

  wq_ph_sensor_id: ph_ezo
  wq_orp_sensor_id: orp_ezo
  wq_do_sensor_id: do_ezo
  wq_ec_sensor_id: ec_ezo

  wq_temp_sensor_id: temp_1
  wq_ideal_temp_id: ideal_temp
  
# --- SCORING PARAMETERS ---
  wq_ph_score_deviation_multiplier: '25.0'
  wq_ph_good_offset_low: '0.3'
  wq_ph_good_offset_high: '0.4'
  wq_ph_alert_offset_low: '0.8'
  wq_ph_alert_offset_high: '1.4'
  wq_orp_excellent_offset: '150'
  wq_orp_alert_offset: '100'
  wq_orp_score_max: '400'
  wq_do_score_deviation_multiplier: '15.0'
  wq_do_good_offset: '1.0'
  wq_do_alert_offset: '2.5'
  wq_ec_score_deviation_multiplier: '0.05'
  wq_ec_good_offset: '200'
  wq_ec_alert_offset: '500'

# --- SCORING WEIGHTS ---
  wq_ph_score_weight: '1.0'
  wq_orp_score_weight: '1.0'
  wq_do_score_weight: '1.0'
  wq_ec_score_weight: '1.0'
  wq_temp_score_weight: '0.5'

web_server:
  sorting_groups:
    - id: sorting_group_water_quality
      name: "Water Quality"
      sorting_weight: ${sorting_group_water_quality}

# Internal dummy sensors to catch disconnected/uncompiled packages safely
sensor:
  - platform: template
    id: wq_dummy_sensor
    internal: true

binary_sensor:
  - platform: template
    id: wq_dummy_binary
    internal: true

text_sensor:
  - platform: template
    name: "Water Quality"
    id: water_quality
    icon: mdi:water-check
    update_interval: 60s
    lambda: |-
      int status_score = -1; // -1=Unknown, 0=Excellent, 1=Good, 2=Caution, 3=Alert
      
      // --- pH Check ---
      if (id(${wq_ph_sensor_id}).has_state() && !isnan(id(${wq_ph_sensor_id}).state)) {
        float val = id(${wq_ph_sensor_id}).state;
        float low = id(ph_ideal_low).state;
        float high = id(ph_ideal_high).state;
        if (val < low - ${wq_ph_alert_offset_low} || val > high + ${wq_ph_alert_offset_high}) status_score = std::max(status_score, 3);
        else if (val < low - ${wq_ph_good_offset_low} || val > high + ${wq_ph_good_offset_high}) status_score = std::max(status_score, 2);
        else if (val >= low && val <= high) status_score = std::max(status_score, 0);
        else status_score = std::max(status_score, 1);
      }

      // --- ORP Check ---
      if (id(${wq_orp_sensor_id}).has_state() && !isnan(id(${wq_orp_sensor_id}).state)) {
        float val = id(${wq_orp_sensor_id}).state;
        float min_good = id(orp_min_good).state;
        float alert = fmaxf(0.0f, min_good - ${wq_orp_alert_offset});
        if (val < alert) status_score = std::max(status_score, 3);
        else if (val < min_good) status_score = std::max(status_score, 2);
        else if (val >= min_good + ${wq_orp_excellent_offset}) status_score = std::max(status_score, 0);
        else status_score = std::max(status_score, 1);
      }

      // --- DO Check ---
      if (id(${wq_do_sensor_id}).has_state() && !isnan(id(${wq_do_sensor_id}).state)) {
        float val = id(${wq_do_sensor_id}).state;
        float low = id(do_ideal_low).state;
        float high = id(do_ideal_high).state;
        if (val < low - ${wq_do_alert_offset} || val > high + ${wq_do_alert_offset}) status_score = std::max(status_score, 3);
        else if (val < low - ${wq_do_good_offset} || val > high + ${wq_do_good_offset}) status_score = std::max(status_score, 2);
        else if (val >= low && val <= high) status_score = std::max(status_score, 0);
        else status_score = std::max(status_score, 1);
      }

      // --- EC Check ---
      if (id(${wq_ec_sensor_id}).has_state() && !isnan(id(${wq_ec_sensor_id}).state)) {
        float val = id(${wq_ec_sensor_id}).state;
        float low = id(ec_ideal_low).state;
        float high = id(ec_ideal_high).state;
        if (val < low - ${wq_ec_alert_offset} || val > high + ${wq_ec_alert_offset}) status_score = std::max(status_score, 3);
        else if (val < low - ${wq_ec_good_offset} || val > high + ${wq_ec_good_offset}) status_score = std::max(status_score, 2);
        else if (val >= low && val <= high) status_score = std::max(status_score, 0);
        else status_score = std::max(status_score, 1);
      }

      // --- Temp Check ---
      if (id(${wq_ideal_temp_id}).has_state()) {
        bool temp_ok = id(${wq_ideal_temp_id}).state;
        if (!temp_ok) status_score = std::max(status_score, 2); // Triggers caution if temp is bad
        else status_score = std::max(status_score, 0);
      }

      // Return Final Status
      if (status_score == 3) return {"Alert"};
      if (status_score == 2) return {"Caution"};
      if (status_score == 1) return {"Good"};
      if (status_score == 0) return {"Excellent"};
      return {"Unknown"};
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("water_quality", "Water Quality Status Updated: %s", x.c_str());
    web_server:
      sorting_group_id: sorting_group_water_quality
      sorting_weight: 10

  - platform: template
    name: "Water Quality Score"
    id: water_quality_score
    icon: mdi:water-percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: 60s
    lambda: |-
      float total_weight = 0.0f;
      float earned_score = 0.0f;

      // pH Math
      if (id(${wq_ph_sensor_id}).has_state() && !isnan(id(${wq_ph_sensor_id}).state)) {
        float val = id(${wq_ph_sensor_id}).state;
        float mid = (id(ph_ideal_low).state + id(ph_ideal_high).state) / 2.0f;
        float score = 100.0f - (fabsf(val - mid) * ${wq_ph_score_deviation_multiplier});
        earned_score += fmaxf(0.0f, fminf(100.0f, score)) * ${wq_ph_score_weight};
        total_weight += ${wq_ph_score_weight};
      }

      // ORP Math
      if (id(${wq_orp_sensor_id}).has_state() && !isnan(id(${wq_orp_sensor_id}).state)) {
        float val = id(${wq_orp_sensor_id}).state;
        float score = (val / ${wq_orp_score_max}) * 100.0f;
        earned_score += fmaxf(0.0f, fminf(100.0f, score)) * ${wq_orp_score_weight};
        total_weight += ${wq_orp_score_weight};
      }

      // DO Math
      if (id(${wq_do_sensor_id}).has_state() && !isnan(id(${wq_do_sensor_id}).state)) {
        float val = id(${wq_do_sensor_id}).state;
        float mid = (id(do_ideal_low).state + id(do_ideal_high).state) / 2.0f;
        float score = 100.0f - (fabsf(val - mid) * ${wq_do_score_deviation_multiplier});
        earned_score += fmaxf(0.0f, fminf(100.0f, score)) * ${wq_do_score_weight};
        total_weight += ${wq_do_score_weight};
      }

      // EC Math
      if (id(${wq_ec_sensor_id}).has_state() && !isnan(id(${wq_ec_sensor_id}).state)) {
        float val = id(${wq_ec_sensor_id}).state;
        float mid = (id(ec_ideal_low).state + id(ec_ideal_high).state) / 2.0f;
        float score = 100.0f - (fabsf(val - mid) * ${wq_ec_score_deviation_multiplier});
        earned_score += fmaxf(0.0f, fminf(100.0f, score)) * ${wq_ec_score_weight};
        total_weight += ${wq_ec_score_weight};
      }

      // Temp Math (100% if in range, 50% if out of range)
      if (id(${wq_ideal_temp_id}).has_state()) {
        float score = id(${wq_ideal_temp_id}).state ? 100.0f : 50.0f;
        earned_score += score * ${wq_temp_score_weight};
        total_weight += ${wq_temp_score_weight};
      }

      // Output final calculated 0-100%
      if (total_weight == 0.0f) return NAN;
      return earned_score / total_weight;
    web_server:
      sorting_group_id: sorting_group_water_quality
      sorting_weight: 11
number:
  - platform: template
    name: "pH Ideal Low"
    id: ph_ideal_low
    icon: mdi:ph
    optimistic: true
    restore_value: true
    initial_value: 6.8
    min_value: 5.0
    max_value: 8.0
    mode: box
    step: 0.1
    entity_category: "Config"
    on_value:
      then:
        - component.update: water_quality
        - component.update: water_quality_score
    web_server:
      sorting_group_id: sorting_group_water_quality

