substitutions:
  sorting_group_water_quality: '20'
  wq_ph_score_deviation_multiplier: '25.0'
  wq_ph_good_offset_low: '0.3'
  wq_ph_good_offset_high: '0.4'
  wq_ph_alert_offset_low: '0.8'
  wq_ph_alert_offset_high: '1.4'
  wq_orp_excellent_offset: '150'
  wq_orp_alert_offset: '100'
  wq_orp_score_max: '400'
  wq_ph_score_weight: '0.6'
  wq_orp_score_weight: '0.4'

web_server:
  sorting_groups:
    - id: sorting_group_water_quality
      name: "Water Quality"
      sorting_weight: ${sorting_group_water_quality}

text_sensor:
  - platform: template
    name: "Water Quality"
    id: water_quality
    icon: mdi:water-check
    update_interval: 60s
    lambda: |-
      // Give local floats completely distinct names from the component IDs
      float current_ph = id(ph_ezo).state;
      float current_orp = id(orp_ezo).state;
      float local_ph_low = id(ph_ideal_low).state;
      float local_ph_high = id(ph_ideal_high).state;
      float local_orp_min = id(orp_min_good).state;
      
      if (isnan(current_ph) || isnan(current_orp) || isnan(local_ph_low) || isnan(local_ph_high) || isnan(local_orp_min)) {
        return {"Unknown"};
      }

      float ph_good_low = local_ph_low - ${wq_ph_good_offset_low};
      float ph_good_high = local_ph_high + ${wq_ph_good_offset_high};
      float ph_alert_low = local_ph_low - ${wq_ph_alert_offset_low};
      float ph_alert_high = local_ph_high + ${wq_ph_alert_offset_high};
      float orp_excellent = local_orp_min + ${wq_orp_excellent_offset};
      float orp_alert = local_orp_min - ${wq_orp_alert_offset};
      if (orp_alert < 0.0f) {
        orp_alert = 0.0f;
      }

      if (current_ph >= local_ph_low && current_ph <= local_ph_high && current_orp >= orp_excellent) {
        return {"Excellent"};
      }
      if (current_ph >= ph_good_low && current_ph <= ph_good_high && current_orp >= local_orp_min) {
        return {"Good"};
      }
      if (current_ph < ph_alert_low || current_ph > ph_alert_high || current_orp < orp_alert) {
        return {"Alert"};
      }
      if (current_ph < ph_good_low || current_ph > ph_good_high || current_orp < local_orp_min) {
        return {"Caution"};
      }
      return {"Good"};
    on_value:
      then:
        - lambda: |-
            if (x == "Alert") {
              ESP_LOGE("water_quality", "⚠️ Water Quality ALERT! pH: %.2f, ORP: %.1f mV - Immediate action required!", id(ph_ezo).state, id(orp_ezo).state);
            } else if (x == "Caution") {
              ESP_LOGW("water_quality", "Water Quality CAUTION - pH: %.2f, ORP: %.1f mV", id(ph_ezo).state, id(orp_ezo).state);
            } else {
              ESP_LOGI("water_quality", "Water Quality: %s - pH: %.2f, ORP: %.1f mV", x.c_str(), id(ph_ezo).state, id(orp_ezo).state);
            }
    web_server:
      sorting_group_id: sorting_group_water_quality
      sorting_weight: 10

sensor:
  - platform: template
    name: "Water Quality Score"
    id: water_quality_score
    icon: mdi:water-percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: 60s
    lambda: |-
      float current_ph = id(ph_ezo).state;
      float current_orp = id(orp_ezo).state;
      float local_ph_low = id(ph_ideal_low).state;
      float local_ph_high = id(ph_ideal_high).state;
      
      if (isnan(current_ph) || isnan(current_orp) || isnan(local_ph_low) || isnan(local_ph_high)) return NAN;

      float ph_ideal_mid = (local_ph_low + local_ph_high) / 2.0f;
      float ph_score = 100.0f - (fabsf(current_ph - ph_ideal_mid) * ${wq_ph_score_deviation_multiplier});
      ph_score = fmaxf(0.0f, fminf(100.0f, ph_score));

      float orp_score = (current_orp / ${wq_orp_score_max}) * 100.0f;
      orp_score = fmaxf(0.0f, fminf(100.0f, orp_score));

      return (ph_score * ${wq_ph_score_weight}) + (orp_score * ${wq_orp_score_weight});
    web_server:
      sorting_group_id: sorting_group_water_quality
      sorting_weight: 11

number:
  - platform: template
    name: "pH Ideal Low"
    id: ph_ideal_low
    icon: mdi:ph
    optimistic: true
    restore_value: true
    initial_value: 6.8
    min_value: 5.0
    max_value: 8.0
    step: 0.1
    entity_category: "Config"
    on_value:
      then:
        - component.update: water_quality
        - component.update: water_quality_score
    web_server:
      sorting_group_id: sorting_group_water_quality

  - platform: template
    name: "pH Ideal High"
    id: ph_ideal_high
    icon: mdi:ph
    optimistic: true
    restore_value: true
    initial_value: 7.6
    min_value: 6.0
    max_value: 9.0
    step: 0.1
    entity_category: "Config"
    on_value:
      then:
        - component.update: water_quality
        - component.update: water_quality_score
    web_server:
      sorting_group_id: sorting_group_water_quality

  - platform: template
    name: "ORP Minimum Good"
    id: orp_min_good
    icon: mdi:react
    optimistic: true
    restore_value: true
    initial_value: 200
    min_value: 0
    max_value: 500
    step: 10
    unit_of_measurement: "mV"
    entity_category: "Config"
    on_value:
      then:
        - component.update: water_quality
        - component.update: water_quality_score
    web_server:
      sorting_group_id: sorting_group_water_quality

  - platform: template
    id: do_ideal_low
    name: "DO Ideal Low"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 85
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: "Config"
    web_server:
      sorting_group_id: sorting_group_water_quality

  - platform: template
    id: do_ideal_high
    name: "DO Ideal High"
    min_value: 100
    max_value: 200
    step: 1
    initial_value: 115
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: "Config"
    web_server:
      sorting_group_id: sorting_group_water_quality

binary_sensor:
  # pH Range Check
  - platform: template
    id: ideal_ph
    name: "pH In Range"
    lambda: |-
      if (id(ph_ezo).has_state() && id(ph_ideal_low).has_state() && id(ph_ideal_high).has_state()) {
        return (id(ph_ezo).state >= id(ph_ideal_low).state && id(ph_ezo).state <= id(ph_ideal_high).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality

  # ORP Range Check
  - platform: template
    id: ideal_orp
    name: "ORP In Range"
    lambda: |-
      if (id(orp_ezo).has_state() && id(orp_min_good).has_state()) {
        return (id(orp_ezo).state >= id(orp_min_good).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality

  # DO Range Check
  - platform: template
    id: ideal_do
    name: "DO In Range"
    lambda: |-
      if (id(sensor_do_percent).has_state() && id(do_ideal_low).has_state() && id(do_ideal_high).has_state()) {
        return (id(sensor_do_percent).state >= id(do_ideal_low).state && id(sensor_do_percent).state <= id(do_ideal_high).state);
      }
      return false;
    web_server:
      sorting_group_id: sorting_group_water_quality