name: Publish Firmware

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware (${{ matrix.file }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file:
          - aquapi_config.yaml
          - aquapi_config_optical.yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml-file: ${{ matrix.file }}
          version: latest
          complete-manifest: true
          release-summary: ${{ github.event.release.body }}
          release-url: ${{ github.event.release.html_url }}

      - name: Rename firmware files with release tag
        run: |
          shopt -s nullglob
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p output
          for f in "${{ steps.esphome-build.outputs.name }}"/*.bin "${{ steps.esphome-build.outputs.name }}"/*.json; do
            filename=$(basename "$f")
            if [ -n "$VERSION" ]; then
              newname="${filename/./-${VERSION}.}"
            else
              newname="$filename"
            fi
            cp "$f" "output/$newname"
          done

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: output/*
